name: Minecraft Auto-Cloner

on:
  workflow_dispatch: # Manual trigger

jobs:
  clone-and-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Apktool
        run: |
          # Fetching the latest jar from Bitbucket
          curl -L https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -o apktool.jar

      - name: Generate Temporary Keystore
        run: |
          keytool -genkey -v -keystore my-release-key.jks \
          -alias my_alias -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass password123 -keypass password123 \
          -dname "CN=MinecraftCloner, OU=Dev, O=Self, L=World, S=Internet, C=US"

      - name: Install Android Build Tools (apksigner)
        run: |
          sudo apt-get update
          sudo apt-get install -y apksigner

      - name: Run Python Patcher
        run: python clone_mc.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Cloned-Minecraft-APKs
          path: modified-mc/*.apk
